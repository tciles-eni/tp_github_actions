name: CI

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout du code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install
        run: npm ci

      - name: Run tests with coverage
        run: npm ci && npm run test:coverage

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()              # Upload même si les tests échouent
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 7       # Garde 7 jours pour analyse

      - name: Comment PR with Jest results
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const jestResults = fs.readFileSync('jest-results.json', 'utf8');
            const commentBody = `
### Jest Test Results
\`\`\`json
${jestResults}
\`\`\`
            `;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody,
            });